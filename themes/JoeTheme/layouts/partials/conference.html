<div class="row">
  <b>
    {{ .type }}:
    {{ if .title }}
      {{ if .link }}
        <a href="{{ .link }}" target="_blank">{{ .title | safeHTML }}</a><br>
      {{ else }}
        {{ .title | safeHTML }}<br>
      {{ end }}
    {{ end }}
  </b>
  {{ if .name }}
    {{ .name }},
  {{ end }}
  {{ .location }} ({{ .date }})
</div>
